[package]
name = "oxgraph-core"
version = "0.0.1"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = "3.9.0"
napi-derive = "3.5.6"
oxc_allocator = "0.134.0"
oxc_parser = "0.134.0"
oxc_ast = "0.134.0"
oxc_span = "0.134.0"
oxc_ast_visit = "0.134.0"
clap = { version = "4.6.1", features = ["derive"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
oxc_resolver = "11.21.0"

[build-dependencies]
napi-build = "2.3.2"
